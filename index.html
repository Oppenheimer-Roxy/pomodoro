<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-hover: #273449;
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --border: #334155;
    --primary: #ef4444;
    --primary-glow: rgba(239, 68, 68, 0.25);
    --break: #22c55e;
    --break-glow: rgba(34, 197, 94, 0.25);
    --ring-bg: #334155;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --task-done: #475569;
    --overlay: rgba(0,0,0,0.5);
  }

  [data-theme="light"] {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface-hover: #f1f5f9;
    --text: #0f172a;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --ring-bg: #e2e8f0;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --task-done: #cbd5e1;
    --overlay: rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.3s, color 0.3s;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 2rem;
    padding: 2rem;
    max-width: 960px;
    width: 100%;
    align-items: start;
  }

  /* ── MAIN TIMER ── */
  .main-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 0;
  }

  .mode-tabs {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .mode-tab {
    padding: 0.5rem 1.25rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.2s;
  }

  .mode-tab:hover { border-color: var(--text-secondary); color: var(--text); }
  .mode-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .mode-tab.break-active { background: var(--break); border-color: var(--break); }

  .active-task-indicator {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    min-height: 1.3em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .active-task-indicator .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--primary);
    display: inline-block;
  }

  .timer-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 0 auto 1.5rem;
  }

  .ring-container {
    position: relative;
    width: 100%; height: 100%;
  }

  .ring-bg {
    fill: none; stroke: var(--ring-bg); stroke-width: 8;
  }

  .ring-progress {
    fill: none; stroke: var(--primary); stroke-width: 8;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }

  .ring-progress.break { stroke: var(--break); }

  .timer-display {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 4.2rem;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }

  .label {
    font-size: 0.875rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 0.25rem;
  }

  .controls {
    display: flex; gap: 1rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
  }

  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }

  .btn-primary {
    width: 62px; height: 62px;
    background: var(--primary); color: #fff;
    box-shadow: 0 0 28px var(--primary-glow);
  }

  .btn-primary.break-btn {
    background: var(--break);
    box-shadow: 0 0 28px var(--break-glow);
  }

  .btn svg { width: 22px; height: 22px; }

  .stats {
    display: flex; gap: 2rem;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .stat { text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 600; }
  .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

  .goal-bar-wrap {
    width: 100%; max-width: 300px;
    height: 6px;
    background: var(--ring-bg);
    border-radius: 3px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .goal-bar-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .goal-text {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .goal-text.goal-met {
    color: var(--break);
    font-weight: 600;
  }

  .settings-toggle {
    background: none; border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
    border-radius: 1rem;
    transition: all 0.2s;
    margin-bottom: 0.5rem;
  }

  .settings-toggle:hover { color: var(--text); background: var(--surface); }

  .settings {
    display: none;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1rem;
    background: var(--surface);
    border-radius: 1rem;
    box-shadow: var(--shadow);
  }

  .settings.open { display: flex; }

  .setting {
    display: flex; flex-direction: column; gap: 0.25rem; align-items: center;
  }

  .setting label {
    font-size: 0.7rem; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .setting input {
    width: 60px; padding: 0.35rem 0;
    text-align: center;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }

  .setting input:focus { outline: none; border-color: var(--primary); }

  .shortcuts {
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-top: 1rem;
  }

  /* ── SIDE PANEL ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .side-panel .section {
    background: var(--surface);
    border-radius: 1rem;
    padding: 1.25rem;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.85rem;
  }

  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  .icon-btn {
    background: none; border: none;
    cursor: pointer; color: var(--text-secondary);
    padding: 0.25rem; border-radius: 0.4rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .icon-btn:hover { color: var(--text); background: var(--bg); }

  .task-input-wrap {
    display: flex; gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .task-input-wrap input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .task-input-wrap input:focus { border-color: var(--primary); }

  .task-input-wrap button {
    padding: 0.5rem 0.9rem;
    border: none; border-radius: 0.5rem;
    background: var(--primary); color: #fff;
    cursor: pointer; font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }

  .task-input-wrap button:hover { opacity: 0.9; }

  .task-list {
    list-style: none;
    max-height: 280px;
    overflow-y: auto;
  }

  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 0.5rem;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
  }

  .task-item:hover { background: var(--surface-hover); }
  .task-item.active { border-color: var(--primary); background: var(--surface-hover); }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .task-check.done {
    background: var(--break); border-color: var(--break);
  }

  .task-check.done::after {
    content: '✓'; color: #fff; font-size: 0.7rem;
    font-weight: bold;
  }

  .task-text {
    flex: 1;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .task-text.done {
    text-decoration: line-through;
    color: var(--task-done);
  }

  .task-delete {
    opacity: 0;
    background: none; border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 1rem; line-height: 1;
    padding: 0.15rem 0.4rem;
    border-radius: 0.3rem;
    transition: opacity 0.15s;
  }

  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: var(--primary); background: var(--bg); }

  .empty-tasks {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.8rem;
    padding: 1.5rem 0;
  }

  /* ── HISTORY ── */
  .history-list {
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.8rem;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }

  .history-item:last-child { border-bottom: none; }

  .history-task {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-time {
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .empty-history {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.8rem;
    padding: 1rem 0;
  }

  .clear-history-btn {
    display: block;
    margin: 0.75rem auto 0;
    background: none; border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.7rem;
    text-decoration: underline;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .clear-history-btn:hover { opacity: 1; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    font-size: 1.1rem;
    transition: all 0.2s;
  }

  .theme-toggle:hover { transform: scale(1.05); }

  .sound-toggle {
    position: absolute;
    top: 1rem; right: 3.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    font-size: 1rem;
    transition: all 0.2s;
  }

  .sound-toggle:hover { transform: scale(1.05); }

  /* ── CELEBRATION ── */
  .confetti-container {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 100;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confetti-fall 1.5s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    .app {
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 1rem;
      max-width: 420px;
    }
    .timer-wrapper { width: 260px; height: 260px; }
    .time { font-size: 3.5rem; }
    .side-panel { gap: 1rem; }
    .task-list { max-height: 200px; }
    .theme-toggle { top: 0.5rem; right: 0.5rem; }
    .sound-toggle { top: 0.5rem; right: 3.2rem; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .paused .time { animation: pulse 2s ease-in-out infinite; }

  .goal-celebration {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--overlay);
    z-index: 200;
    animation: fadeIn 0.3s ease;
  }

  .goal-celebration-card {
    background: var(--surface);
    border-radius: 1.5rem;
    padding: 2.5rem;
    text-align: center;
    box-shadow: var(--shadow);
    animation: scaleIn 0.4s ease;
  }

  .goal-celebration-card .big-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
  .goal-celebration-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .goal-celebration-card p { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .goal-celebration-card button {
    padding: 0.6rem 2rem;
    border: none; border-radius: 2rem;
    background: var(--primary); color: #fff;
    cursor: pointer; font-size: 1rem; font-weight: 600;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
<button class="sound-toggle" id="soundToggle" title="切换音效">🔊</button>

<div class="app">
  <div class="main-panel">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="work">专注</button>
      <button class="mode-tab" data-mode="shortBreak">短休息</button>
      <button class="mode-tab" data-mode="longBreak">长休息</button>
    </div>

    <div class="active-task-indicator" id="activeTaskIndicator">
      <span class="dot"></span><span id="activeTaskName">未选择任务</span>
    </div>

    <div class="timer-wrapper" id="timerWrapper">
      <svg class="ring-container" viewBox="0 0 300 300">
        <circle class="ring-bg" cx="150" cy="150" r="135"/>
        <circle class="ring-progress" id="ringProgress" cx="150" cy="150" r="135"
                stroke-dasharray="848.23" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <div class="time" id="timeDisplay">25:00</div>
        <div class="label" id="labelDisplay">专注</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnReset" title="重置 (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button class="btn btn-primary" id="btnToggle" title="开始/暂停 (空格)">
        <svg viewBox="0 0 24 24" fill="currentColor" id="iconPlay">
          <polygon points="6 3 20 12 6 21 6 3"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="currentColor" id="iconPause" style="display:none">
          <rect x="5" y="3" width="5" height="18"/>
          <rect x="14" y="3" width="5" height="18"/>
        </svg>
      </button>
      <button class="btn" id="btnSkip" title="跳过 (→)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4"/>
          <line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <div class="goal-bar-wrap" id="goalBarWrap">
      <div class="goal-bar-fill" id="goalBarFill" style="width:0%"></div>
    </div>
    <div class="goal-text" id="goalText">今日目标: 0 / 8</div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="statSessions">0</div>
        <div class="stat-label">完成专注</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statTotalTime">0m</div>
        <div class="stat-label">总专注时长</div>
      </div>
    </div>

    <button class="settings-toggle" id="settingsToggle">⚙ 设置</button>
    <div class="settings" id="settingsPanel">
      <div class="setting">
        <label>专注 (分钟)</label>
        <input type="number" id="workDuration" value="25" min="1" max="120">
      </div>
      <div class="setting">
        <label>短休息 (分钟)</label>
        <input type="number" id="shortBreakDuration" value="5" min="1" max="60">
      </div>
      <div class="setting">
        <label>长休息 (分钟)</label>
        <input type="number" id="longBreakDuration" value="15" min="1" max="60">
      </div>
      <div class="setting">
        <label>长休息间隔</label>
        <input type="number" id="longBreakInterval" value="4" min="1" max="10">
      </div>
      <div class="setting">
        <label>每日目标</label>
        <input type="number" id="dailyGoal" value="8" min="1" max="30">
      </div>
    </div>

    <div class="shortcuts">空格键 开始/暂停 &nbsp; R键 重置 &nbsp; →键 跳过</div>
  </div>

  <div class="side-panel">
    <!-- TASKS -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">任务清单</span>
        <span style="font-size:0.75rem;color:var(--text-secondary)" id="taskCount">0</span>
      </div>
      <div class="task-input-wrap">
        <input type="text" id="taskInput" placeholder="添加新任务..." maxlength="100">
        <button id="btnAddTask">添加</button>
      </div>
      <ul class="task-list" id="taskList">
        <li class="empty-tasks">暂无任务，添加一个吧</li>
      </ul>
    </div>

    <!-- HISTORY -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">完成记录</span>
      </div>
      <ul class="history-list" id="historyList">
        <li class="empty-history">还没有完成记录</li>
      </ul>
      <button class="clear-history-btn" id="btnClearHistory">清空记录</button>
    </div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 135;

// ── DOM refs ──
const ring = document.getElementById('ringProgress');
const timeDisplay = document.getElementById('timeDisplay');
const labelDisplay = document.getElementById('labelDisplay');
const btnToggle = document.getElementById('btnToggle');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const timerWrapper = document.getElementById('timerWrapper');
const activeTaskName = document.getElementById('activeTaskName');
const statSessions = document.getElementById('statSessions');
const statTotalTime = document.getElementById('statTotalTime');
const goalBarFill = document.getElementById('goalBarFill');
const goalText = document.getElementById('goalText');
const confettiContainer = document.getElementById('confettiContainer');

const workDurationInput = document.getElementById('workDuration');
const shortBreakDurationInput = document.getElementById('shortBreakDuration');
const longBreakDurationInput = document.getElementById('longBreakDuration');
const longBreakIntervalInput = document.getElementById('longBreakInterval');
const dailyGoalInput = document.getElementById('dailyGoal');

const taskInput = document.getElementById('taskInput');
const taskList = document.getElementById('taskList');
const taskCount = document.getElementById('taskCount');
const historyList = document.getElementById('historyList');

ring.style.strokeDasharray = CIRCUMFERENCE;
ring.style.strokeDashoffset = '0';

// ── STATE ──
const STORAGE_KEY = 'pomodoro_advanced';
let state = loadState();

function defaultState() {
  return {
    mode: 'work',
    timeLeft: 25 * 60,
    totalSeconds: 25 * 60,
    intervalId: null,
    completedSessions: 0,
    totalWorkMinutes: 0,
    settings: {
      workDuration: 25,
      shortBreakDuration: 5,
      longBreakDuration: 15,
      longBreakInterval: 4,
      dailyGoal: 8,
    },
    tasks: [],
    activeTaskId: null,
    history: [],
    theme: 'dark',
    soundEnabled: true,
    todayDate: getDateStr(),
    todayCompleted: 0,
  };
}

function getDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      const base = defaultState();
      const merged = { ...base, ...saved };
      // Reset timer state on reload
      const s = merged.settings;
      merged.mode = 'work';
      merged.timeLeft = s.workDuration * 60;
      merged.totalSeconds = s.workDuration * 60;
      merged.intervalId = null;
      // Reset today if date changed
      if (merged.todayDate !== getDateStr()) {
        merged.todayDate = getDateStr();
        merged.todayCompleted = 0;
      }
      return merged;
    }
  } catch {}
  return defaultState();
}

function saveState() {
  const toSave = {
    completedSessions: state.completedSessions,
    totalWorkMinutes: state.totalWorkMinutes,
    settings: state.settings,
    tasks: state.tasks,
    activeTaskId: state.activeTaskId,
    history: state.history,
    theme: state.theme,
    soundEnabled: state.soundEnabled,
    todayDate: state.todayDate,
    todayCompleted: state.todayCompleted,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
}

// ── TIMER LOGIC ──
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateDisplay() {
  timeDisplay.textContent = formatTime(state.timeLeft);
  const progress = state.timeLeft / state.totalSeconds;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  document.title = `${formatTime(state.timeLeft)} - 番茄钟`;
}

function setMode(newMode) {
  clearInterval(state.intervalId);
  state.intervalId = null;
  state.mode = newMode;

  const s = state.settings;
  const isBreak = state.mode === 'shortBreak' || state.mode === 'longBreak';

  if (state.mode === 'work') {
    state.totalSeconds = s.workDuration * 60;
  } else if (state.mode === 'shortBreak') {
    state.totalSeconds = s.shortBreakDuration * 60;
  } else {
    state.totalSeconds = s.longBreakDuration * 60;
  }

  state.timeLeft = state.totalSeconds;

  ring.classList.toggle('break', isBreak);
  btnToggle.classList.toggle('break-btn', isBreak);
  timerWrapper.classList.remove('paused');

  iconPlay.style.display = 'block';
  iconPause.style.display = 'none';

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active', 'break-active'));
  const tab = document.querySelector(`[data-mode="${state.mode}"]`);
  if (isBreak) {
    tab.classList.add('active', 'break-active');
  } else {
    tab.classList.add('active');
  }

  const labels = { work: '专注', shortBreak: '短休息', longBreak: '长休息' };
  labelDisplay.textContent = labels[state.mode];
  updateDisplay();
}

function toggleTimer() {
  if (state.intervalId) {
    pause();
  } else {
    start();
  }
}

function start() {
  state.intervalId = setInterval(tick, 1000);
  iconPlay.style.display = 'none';
  iconPause.style.display = 'block';
  timerWrapper.classList.remove('paused');
}

function pause() {
  clearInterval(state.intervalId);
  state.intervalId = null;
  iconPlay.style.display = 'block';
  iconPause.style.display = 'none';
  timerWrapper.classList.add('paused');
}

function reset() {
  clearInterval(state.intervalId);
  state.intervalId = null;
  state.timeLeft = state.totalSeconds;
  iconPlay.style.display = 'block';
  iconPause.style.display = 'none';
  timerWrapper.classList.remove('paused');
  updateDisplay();
}

function tick() {
  state.timeLeft--;
  updateDisplay();

  if (state.timeLeft <= 0) {
    clearInterval(state.intervalId);
    state.intervalId = null;

    if (state.soundEnabled) notify();

    if (state.mode === 'work') {
      const s = state.settings;
      state.completedSessions++;
      state.totalWorkMinutes += s.workDuration;
      state.todayCompleted++;

      // Record in history
      const task = state.tasks.find(t => t.id === state.activeTaskId);
      state.history.unshift({
        id: Date.now(),
        taskName: task ? task.text : '未指定任务',
        duration: s.workDuration,
        timestamp: new Date().toISOString(),
        date: getDateStr(),
      });

      // Mark task as having a pomodoro done
      if (task) {
        task.pomodoros = (task.pomodoros || 0) + 1;
      }

      updateStats();
      updateHistory();
      updateGoal();
      saveState();
      confetti();

      const interval = s.longBreakInterval;
      if (state.todayCompleted % interval === 0 && state.todayCompleted > 0) {
        setMode('longBreak');
      } else {
        setMode('shortBreak');
      }
      start();
    } else {
      setMode('work');
      updateDisplay();
    }
  }
}

function skip() {
  clearInterval(state.intervalId);
  state.intervalId = null;

  if (state.mode === 'work') {
    const s = state.settings;
    state.completedSessions++;
    state.totalWorkMinutes += s.workDuration;
    state.todayCompleted++;

    const task = state.tasks.find(t => t.id === state.activeTaskId);
    state.history.unshift({
      id: Date.now(),
      taskName: task ? task.text : '未指定任务',
      duration: s.workDuration,
      timestamp: new Date().toISOString(),
      date: getDateStr(),
    });
    if (task) {
      task.pomodoros = (task.pomodoros || 0) + 1;
    }

    updateStats();
    updateHistory();
    updateGoal();
    saveState();

    const interval = s.longBreakInterval;
    setMode(state.todayCompleted % interval === 0 && state.todayCompleted > 0 ? 'longBreak' : 'shortBreak');
  } else {
    setMode('work');
  }
  updateDisplay();
}

function notify() {
  try {
    new Notification('番茄钟', {
      body: state.mode === 'work' ? '专注时间结束！休息一下吧。' : '休息结束！开始新的专注吧。',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>'
    });
  } catch {}

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  [800, 600, 900].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.value = 0.15;
    osc.start(audioCtx.currentTime + i * 0.2);
    osc.stop(audioCtx.currentTime + i * 0.2 + 0.2);
  });
}

function confetti() {
  const colors = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 20) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (1 + Math.random() * 1.5) + 's';
    piece.style.width = (6 + Math.random() * 10) + 'px';
    piece.style.height = (6 + Math.random() * 10) + 'px';
    frag.appendChild(piece);
  }
  confettiContainer.appendChild(frag);
  setTimeout(() => { confettiContainer.innerHTML = ''; }, 2500);
}

function showGoalCelebration() {
  const div = document.createElement('div');
  div.className = 'goal-celebration';
  div.innerHTML = `
    <div class="goal-celebration-card">
      <div class="big-emoji">🎉</div>
      <h2>目标达成！</h2>
      <p>太棒了！你已经完成了今日 ${state.settings.dailyGoal} 个番茄钟的目标！</p>
      <button id="btnCloseCelebration">继续加油</button>
    </div>
  `;
  document.body.appendChild(div);
  div.querySelector('#btnCloseCelebration').addEventListener('click', () => div.remove());
  div.addEventListener('click', e => { if (e.target === div) div.remove(); });
}

// ── STATS & GOAL ──
function updateStats() {
  statSessions.textContent = state.completedSessions;
  statTotalTime.textContent = state.totalWorkMinutes + 'm';
}

function updateGoal() {
  const goal = state.settings.dailyGoal;
  const done = Math.min(state.todayCompleted, goal);
  const pct = Math.round((done / goal) * 100);
  goalBarFill.style.width = pct + '%';
  goalText.textContent = `今日目标: ${state.todayCompleted} / ${goal}`;

  if (state.todayCompleted >= goal) {
    goalText.classList.add('goal-met');
  } else {
    goalText.classList.remove('goal-met');
  }

  // Check if just reached goal
  if (state.todayCompleted === goal) {
    showGoalCelebration();
  }
}

// ── TASKS ──
function renderTasks() {
  taskList.innerHTML = '';
  if (state.tasks.length === 0) {
    taskList.innerHTML = '<li class="empty-tasks">暂无任务，添加一个吧</li>';
  } else {
    state.tasks.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.id === state.activeTaskId ? ' active' : '');

      const check = document.createElement('div');
      check.className = 'task-check' + (task.completed ? ' done' : '');
      check.addEventListener('click', e => {
        e.stopPropagation();
        task.completed = !task.completed;
        if (task.completed && task.id === state.activeTaskId) {
          state.activeTaskId = null;
        }
        saveState();
        renderTasks();
        updateActiveTaskDisplay();
      });

      const span = document.createElement('span');
      span.className = 'task-text' + (task.completed ? ' done' : '');
      const pomoCount = (task.pomodoros || 0) > 0 ? ` (${task.pomodoros}🍅)` : '';
      span.textContent = task.text + pomoCount;

      li.appendChild(check);
      li.appendChild(span);

      const del = document.createElement('button');
      del.className = 'task-delete';
      del.textContent = '×';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (task.id === state.activeTaskId) {
          state.activeTaskId = null;
        }
        state.tasks = state.tasks.filter(t => t.id !== task.id);
        saveState();
        renderTasks();
        updateActiveTaskDisplay();
      });

      li.appendChild(del);

      li.addEventListener('click', () => {
        if (!task.completed) {
          state.activeTaskId = state.activeTaskId === task.id ? null : task.id;
        }
        saveState();
        renderTasks();
        updateActiveTaskDisplay();
      });

      taskList.appendChild(li);
    });
  }
  taskCount.textContent = state.tasks.filter(t => !t.completed).length;
}

function updateActiveTaskDisplay() {
  const task = state.tasks.find(t => t.id === state.activeTaskId);
  activeTaskName.textContent = task ? task.text : '未选择任务';
}

// ── HISTORY ──
function updateHistory() {
  historyList.innerHTML = '';
  const todayHistory = state.history.filter(h => h.date === getDateStr());
  if (todayHistory.length === 0) {
    historyList.innerHTML = '<li class="empty-history">还没有完成记录</li>';
  } else {
    todayHistory.forEach(h => {
      const li = document.createElement('li');
      li.className = 'history-item';
      const t = new Date(h.timestamp);
      const timeStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
      li.innerHTML = `
        <span class="history-task">${escapeHtml(h.taskName)}</span>
        <span class="history-time">${timeStr} · ${h.duration}min</span>
      `;
      historyList.appendChild(li);
    });
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── THEME ──
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeToggle').textContent = state.theme === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveState();
}

// ── SOUND ──
function updateSoundIcon() {
  document.getElementById('soundToggle').textContent = state.soundEnabled ? '🔊' : '🔇';
}

function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  updateSoundIcon();
  saveState();
}

// ── INIT ──
function init() {
  const s = state.settings;
  workDurationInput.value = s.workDuration;
  shortBreakDurationInput.value = s.shortBreakDuration;
  longBreakDurationInput.value = s.longBreakDuration;
  longBreakIntervalInput.value = s.longBreakInterval;
  dailyGoalInput.value = s.dailyGoal;

  applyTheme();
  updateSoundIcon();
  renderTasks();
  updateActiveTaskDisplay();
  updateStats();
  updateGoal();
  updateHistory();
  updateDisplay();
}

// ── EVENT LISTENERS ──
btnToggle.addEventListener('click', toggleTimer);
document.getElementById('btnReset').addEventListener('click', reset);
document.getElementById('btnSkip').addEventListener('click', skip);

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    clearInterval(state.intervalId);
    state.intervalId = null;
    setMode(tab.dataset.mode);
  });
});

document.getElementById('btnAddTask').addEventListener('click', () => {
  const text = taskInput.value.trim();
  if (!text) return;
  state.tasks.push({
    id: Date.now(),
    text,
    completed: false,
    pomodoros: 0,
  });
  taskInput.value = '';
  saveState();
  renderTasks();
});

taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    document.getElementById('btnAddTask').click();
  }
});

document.getElementById('btnClearHistory').addEventListener('click', () => {
  state.history = state.history.filter(h => h.date !== getDateStr());
  saveState();
  updateHistory();
});

[workDurationInput, shortBreakDurationInput, longBreakDurationInput].forEach(input => {
  input.addEventListener('change', () => {
    let val = parseInt(input.value);
    const max = parseInt(input.max);
    const min = parseInt(input.min);
    if (isNaN(val) || val < min) val = min;
    if (val > max) val = max;
    input.value = val;

    const key = input === workDurationInput ? 'workDuration'
      : input === shortBreakDurationInput ? 'shortBreakDuration'
      : 'longBreakDuration';
    state.settings[key] = val;

    saveState();
    if (!state.intervalId) {
      if ((state.mode === 'work' && input === workDurationInput) ||
          (state.mode === 'shortBreak' && input === shortBreakDurationInput) ||
          (state.mode === 'longBreak' && input === longBreakDurationInput)) {
        setMode(state.mode);
      }
    }
  });
});

longBreakIntervalInput.addEventListener('change', () => {
  let val = parseInt(longBreakIntervalInput.value);
  if (isNaN(val) || val < 1) val = 1;
  if (val > 10) val = 10;
  longBreakIntervalInput.value = val;
  state.settings.longBreakInterval = val;
  saveState();
});

dailyGoalInput.addEventListener('change', () => {
  let val = parseInt(dailyGoalInput.value);
  if (isNaN(val) || val < 1) val = 1;
  if (val > 30) val = 30;
  dailyGoalInput.value = val;
  state.settings.dailyGoal = val;
  saveState();
  updateGoal();
});

document.getElementById('themeToggle').addEventListener('click', toggleTheme);
document.getElementById('soundToggle').addEventListener('click', toggleSound);

document.getElementById('settingsToggle').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.toggle('open');
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    toggleTimer();
  } else if (e.code === 'KeyR') {
    reset();
  } else if (e.code === 'ArrowRight') {
    skip();
  }
});

if (Notification.permission === 'default') {
  Notification.requestPermission();
}

init();
</script>
</body>
</html>
